<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Display</title>
    <link rel="stylesheet" href="display.css">
</head>
<body>
    <div class="display-container">
        <div class="timer-display">
            <div id="countdown-timer">10:00</div>
            <div id="elapsed-time">00:00</div>
        </div>
        
        <div class="text-area">
            <div class="scheduled-countdown" id="scheduled-countdown">
                <div class="countdown-label">Scheduled Start In:</div>
                <div class="countdown-time" id="countdown-time">00:00:00</div>
                <div class="countdown-target" id="countdown-target">Starting at: --:--:--</div>
            </div>
            
            <div id="prompter-text">
                <p>Waiting for controller connection...</p>
                <p>Open the controller page to load your manuscript and begin prompting.</p>
            </div>
        </div>
        
        <div class="on-air-indicator" id="on-air-indicator">
            <div class="on-air-light"></div>
            <span class="on-air-text">ON AIR</span>
        </div>
        
        <div class="connection-status" id="connection-status">
            <span class="status-indicator disconnected">●</span>
            <span class="status-text">Disconnected</span>
        </div>

        <button class="mobile-mode-btn" id="mobile-mode-btn" type="button">
            Modo móvil
        </button>

        <video
            class="keep-awake-video"
            id="keep-awake-video"
            muted
            playsinline
            loop
            aria-hidden="true"
        ></video>
    </div>
    
    <script src="display.js"></script>
</body>
</html>
